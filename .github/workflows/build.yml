name: Build ESP32-C5 with Arduino CLI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Arduino CLI
      run: |
        curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
        echo "$HOME/bin" >> $GITHUB_PATH
    
    - name: Install ESP32 core (dev version for C5 support)
      run: |
        arduino-cli config init
        arduino-cli config set board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_dev_index.json
        arduino-cli core update-index
        arduino-cli core install esp32:esp32@3.0.0
    
    - name: Compile sketch for ESP32-C5
      run: |
        arduino-cli compile --fqbn esp32:esp32:esp32c5 --build-path ./build ./ESP_Code.ino
    
    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: esp32c5-firmware
        path: ./build/*.bin
        retention-days: 30
    
    - name: Upload to release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ./build/*.bin
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
