name: Build ESP32-C5 with PlatformIO

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio
    
    - name: Prepare source files
      run: |
        # Tạo thư mục src
        mkdir -p src
        
        # Copy tất cả file .ino, .h, .cpp vào src
        cp *.ino src/ 2>/dev/null || true
        cp *.h src/ 2>/dev/null || true
        cp *.cpp src/ 2>/dev/null || true
        
        # Copy thư mục boards nếu có
        cp -r boards src/ 2>/dev/null || true
        
        # Hiển thị cấu trúc để debug
        echo "=== Source files ==="
        ls -la src/
        echo "==================="
    
    - name: Build for ESP32-C5
      run: pio run -e esp32-c5
    
    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: esp32-c5-firmware
        path: .pio/build/esp32-c5/*.bin
        retention-days: 30
