name: Build ESP32-C5 Duino-Coin Miner

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio
    
    - name: Update PlatformIO
      run: pio update
    
    - name: Build for ESP32-C5
      run: pio run
    
    - name: List build artifacts
      run: ls -la .pio/build/esp32-c5/
    
    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: esp32-c5-firmware
        path: |
          .pio/build/esp32-c5/*.bin
          .pio/build/esp32-c5/*.elf
        retention-days: 30
    
    - name: Upload to release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: .pio/build/esp32-c5/*.bin
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
