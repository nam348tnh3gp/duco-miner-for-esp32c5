; PlatformIO Project Configuration for ESP32-C5
[platformio]
default_envs = esp32c5

[common]
build_flags = 
    -DCORE=1
    -DSERIAL_PRINTING
    -DWEB_DASHBOARD=0
    -O2
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:esp32c5]
platform = espressif32
board = esp32c5
board_dir = boards
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags = 
    ${common.build_flags}
    -DRISCV
    -DCONFIG_IDF_TARGET_ESP32C5

lib_deps = 
    bblanchon/ArduinoJson@^6.21.5

board_build.flash_mode = qio
board_build.f_cpu = 240000000L
board_build.flash_size = 4MB
