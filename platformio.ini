; PlatformIO Project Configuration for ESP32-C5

[platformio]
default_envs = esp32-c5

[common]
build_flags = 
    -DCORE=1
    -DSERIAL_PRINTING
    -DWEB_DASHBOARD
    -O2

[env:esp32-c5]
platform = espressif32
board = esp32-c5-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.flash_mode = qio
board_build.f_cpu = 240000000L

build_flags = 
    ${common.build_flags}
    -DRISCV
    -DCONFIG_IDF_TARGET_ESP32C5

lib_deps = 
    bblanchon/ArduinoJson@^6.21.5
    me-no-dev/ESPAsyncWebServer@^3.3.0
    lorol/LittleFS_esp32@^1.1.0
